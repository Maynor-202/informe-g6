<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VMC Empresa</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f1f5f9;
}

.header{
    background:#0f172a;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.container{padding:15px;}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

select{
    width:100%;
    padding:8px;
    margin-top:5px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    margin:5px;
}

.history{
    max-height:200px;
    overflow:auto;
    font-size:13px;
}
</style>
</head>

<body>

<div class="header">
📊 VMC Empresa
<input type="week" id="week">
</div>

<div class="container">

<div>
<button onclick="guardar()">💾 Guardar</button>
<button onclick="exportar()">📄 PDF</button>
</div>

<div class="card">
<h3>🟦 Tesoros</h3>
<select id="t1"></select>
<select id="t2"></select>
<select id="t3"></select>
</div>

<div class="card">
<h3>🟩 Maestros</h3>
<select id="m1"></select>
<select id="m2"></select>
<select id="m3"></select>
</div>

<div class="card">
<h3>🟨 Vida Cristiana</h3>
<select id="v1"></select>
<select id="v2"></select>
<select id="v3"></select>
</div>

<div class="card">
<h3>📊 Historial</h3>
<div class="history" id="historial"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
